services:
  postgres:
    image: postgres:15-alpine
    container_name: brainbolt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brainbolt
      POSTGRES_PASSWORD: brainbolt
      POSTGRES_DB: brainbolt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainbolt -d brainbolt"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    networks:
      - brainbolt-network

  redis:
    image: redis:7-alpine
    container_name: brainbolt-redis
    restart: unless-stopped
    # prefer volatile-lru eviction to protect leaderboard keys
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    networks:
      - brainbolt-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainbolt-backend
    restart: unless-stopped
    # Load secrets and environment-specific settings from external .env file
    # This approach keeps sensitive data (JWT_SECRET) out of version control
    # and allows flexible configuration across development/staging/production
    env_file:
      - .env
    # Base environment variables (can be overridden by .env)
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://brainbolt:brainbolt@postgres:5432/brainbolt
      REDIS_URL: redis://redis:6379
      SEED: "true"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 512m
    cpus: '0.5'
    networks:
      - brainbolt-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    container_name: brainbolt-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    mem_limit: 512m
    cpus: '0.5'
    networks:
      - brainbolt-network

volumes:
  postgres_data:
  redis_data:

networks:
  brainbolt-network:
    driver: bridge
